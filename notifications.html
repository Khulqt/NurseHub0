<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز الإشعارات — NurseHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="section" style="padding-top:36px">
  <div class="container" style="max-width:720px">
    <div class="section-head">
      <div>
        <h1 style="font-size:1.8rem">مركز الإشعارات</h1>
        <p class="sub" style="color:var(--ink-soft)">آخر التحديثات والإعلانات من فريق NurseHub</p>
      </div>
      <button class="btn btn-outline btn-sm" id="enablePush">🔔 تفعيل إشعارات الجوال</button>
    </div>

    <div id="notifList">
      <div class="skeleton" style="height:80px; margin-bottom:10px"></div>
      <div class="skeleton" style="height:80px; margin-bottom:10px"></div>
      <div class="skeleton" style="height:80px"></div>
    </div>
  </div>
</section>

<script type="module">
import { mountLayout, toast, timeAgo, escapeHtml } from './app.js';
import { db, collection, query, where, orderBy, limit, getDocs, getMessagingIfSupported } from './firebase-config.js';

mountLayout('notifications.html');

async function loadNotifications(){
  const list = document.getElementById('notifList');
  try{
    const qy = query(collection(db,'notifications'), where('target','==','all'), orderBy('createdAt','desc'), limit(30));
    const snap = await getDocs(qy);
    if(snap.empty){
      list.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <p>لا توجد إشعارات حتى الآن.</p></div>`;
      return;
    }
    list.innerHTML = snap.docs.map(d=>{
      const n = d.data();
      const date = n.createdAt?.toDate ? n.createdAt.toDate() : null;
      return `<div class="notif-item">
        <div class="n-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
        <div>
          <b>${escapeHtml(n.title||'')}</b>
          <p style="margin:4px 0 0">${escapeHtml(n.body||'')}</p>
          <div class="rdate" style="color:var(--ink-soft); font-size:.8rem; margin-top:6px">${date?timeAgo(date):''}</div>
        </div>
      </div>`;
    }).join('');
  }catch(err){
    console.error(err);
    list.innerHTML = `<div class="empty-state"><p>تعذر تحميل الإشعارات حاليًا.</p></div>`;
  }
}

document.getElementById('enablePush').addEventListener('click', async ()=>{
  try{
    if(!('Notification' in window)){ toast('المتصفح لا يدعم الإشعارات'); return; }
    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){ toast('لم يتم منح إذن الإشعارات'); return; }
    const messaging = await getMessagingIfSupported();
    if(!messaging){ toast('تم تفعيل الإذن، لكن الإشعارات الفورية تتطلب إعداد VAPID key من مطوّر الموقع.'); return; }
    toast('تم تفعيل الإشعارات بنجاح ✅');
  }catch(err){
    console.error(err);
    toast('تعذر تفعيل الإشعارات');
  }
});

loadNotifications();
</script>
</body>
</html>
